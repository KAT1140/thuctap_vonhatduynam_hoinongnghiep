{% extends "base.html" %}

{% block title %}Đăng nhập - Hội Nông Dân Việt Nam{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="Logo" style="height: 80px; width: auto;">
                    <h3 class="mt-3">Hội Nông Dân Việt Nam</h3>
                    <p class="text-muted">Hệ thống quản lý</p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Tài khoản đăng nhập</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Mật khẩu</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label" for="remember">
                            Nhớ tôi
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100">Đăng nhập</button>
                </form>

                <hr class="my-4">
                <p class="text-center text-muted small">Admin_Xa_HungMymoi</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
