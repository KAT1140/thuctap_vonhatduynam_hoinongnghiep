{% extends "base.html" %}

{% block title %}Sửa hộ viên - Hội Nông Dân Việt Nam{% endblock %}

{% block content %}
<div class="row mt-4">
    <div class="col-md-8 offset-md-2">
        <h2 class="mb-4">Sửa thông tin hộ viên</h2>

        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="full_name" class="form-label">Họ tên <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="full_name" name="full_name" value="{{ member.full_name or '' }}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="date_of_birth" class="form-label">Ngày sinh</label>
                                <input type="date" class="form-control" id="date_of_birth" name="date_of_birth" value="{{ member.date_of_birth or '' }}">
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="gender" class="form-label">Giới tính</label>
                                <select class="form-select" id="gender" name="gender">
                                    <option value="khac" {% if member.gender == 'khac' %}selected{% endif %}>Khác</option>
                                    <option value="nam" {% if member.gender == 'nam' %}selected{% endif %}>Nam</option>
                                    <option value="nu" {% if member.gender == 'nu' %}selected{% endif %}>Nữ</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="id_number" class="form-label">Số CMND/CCCD</label>
                                <input type="text" class="form-control" id="id_number" name="id_number" value="{{ member.id_number or '' }}">
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" name="email" value="{{ member.email or '' }}">
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="education_level" class="form-label">Trình độ học vấn</label>
                                <select class="form-select" id="education_level" name="education_level">
                                    <option value="">-- Chọn một --</option>
                                    <option value="THCS" {% if member.education_level == 'THCS' %}selected{% endif %}>THCS</option>
                                    <option value="THPT" {% if member.education_level == 'THPT' %}selected{% endif %}>THPT</option>
                                    <option value="Cạo đẳng" {% if member.education_level == 'Cạo đẳng' %}selected{% endif %}>Cạo đẳng</option>
                                    <option value="Đại học" {% if member.education_level == 'Đại học' %}selected{% endif %}>Đại học</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="member_type" class="form-label">Phân loại</label>
                                <select class="form-select" id="member_type" name="member_type">
                                    <option value="thuong" {% if member.member_type == 'thuong' %}selected{% endif %}>Hội viên thường</option>
                                    <option value="dang_vien" {% if member.member_type == 'dang_vien' %}selected{% endif %}>Đảng viên</option>
                                    <option value="nong_cot" {% if member.member_type == 'nong_cot' %}selected{% endif %}>Nòng cốt</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="status" class="form-label">Trạng thái</label>
                                <select class="form-select" id="status" name="status">
                                    <option value="active" {% if member.status == 'active' %}selected{% endif %}>Hoạt động</option>
                                    <option value="inactive" {% if member.status == 'inactive' %}selected{% endif %}>Không hoạt động</option>
                                    <option value="blocked" {% if member.status == 'blocked' %}selected{% endif %}>Bị khóa</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Lưu thay đổi
                        </button>
                        <a href="{{ url_for('members_list') }}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Hủy
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
